name: Generate Museum Association RSS Feed

on:
  schedule:
    - cron: '30 0 * * *' # 매일 한국 시간 오전 9시 30분에 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedgen pytz selenium webdriver-manager

    - name: Run Museum RSS Generator Script
      run: python generate_museum_rss.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add museum_rss.xml
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Museum Association RSS feed" && git push)
